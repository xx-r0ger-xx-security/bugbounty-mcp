name: Dependabot PR Alert

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: read

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Send Discord alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg content "🔔 **Dependabot PR opened — $REPO**\n$PR_TITLE\n$PR_URL" \
            '{"content": $content}')
          curl -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "$payload"
