name: Security

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Mondays

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secrets:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz | tar -xz
      - name: Run gitleaks
        run: ./gitleaks detect --source=. --log-opts="--all" --verbose

  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install semgrep
      - run: semgrep scan --config=auto --sarif --output=semgrep.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif

  dependencies:
    name: Dependency Scan (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm audit --audit-level=moderate

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [secrets, sast, dependencies]
    if: failure()
    steps:
      - name: Send Discord alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 Security scan failed in **${{ github.repository }}**\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  summary:
    name: Weekly Summary
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'schedule'
    needs: [secrets, sast, dependencies]
    steps:
      - name: Get open Dependabot alert count
        id: deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>/dev/null || echo 0)
          echo "count=$count" >> $GITHUB_OUTPUT
      - name: Send Discord summary
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          secrets="${{ needs.secrets.result }}"
          sast="${{ needs.sast.result }}"
          deps="${{ needs.dependencies.result }}"
          dep_count="${{ steps.deps.outputs.count }}"

          [ "$secrets" = "success" ] && s_icon="✅" || s_icon="❌"
          [ "$sast" = "success" ] && sast_icon="✅" || sast_icon="❌"
          [ "$deps" = "success" ] && d_icon="✅" || d_icon="❌"
          [ "$dep_count" = "0" ] && da_icon="✅" || da_icon="⚠️"

          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"📋 **Weekly Security Report — ${{ github.repository }}**\n${s_icon} Secret scan: ${secrets}\n${sast_icon} SAST: ${sast}\n${d_icon} Dependencies: ${deps}\n${da_icon} Open Dependabot alerts: ${dep_count}\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
