name: Security

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Mondays

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz | tar -xz
      - name: Run gitleaks
        run: ./gitleaks detect --source=. --log-opts="--all" --verbose

  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install semgrep
      - run: semgrep scan --config=auto --sarif --output=semgrep.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif

  dependencies:
    name: Dependency Scan (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm audit --audit-level=moderate

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [secrets, sast, dependencies]
    if: failure()
    steps:
      - name: Send Discord alert
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 Security scan failed in **${{ github.repository }}**\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
